<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="../manifest.json">
  <title>支払い管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sfc: { dark:'#004d29', primary:'#006837', light:'#e8f5e9', border:'#a5d6a7' }
          },
          fontFamily: {
            sans: ['Noto Sans JP','sans-serif'],
            mono: ['DM Mono','monospace'],
          }
        }
      }
    }
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width:28px; height:28px; border:3px solid #d1d5db;
      border-top-color:#004d29; border-radius:50%;
      animation: spin 0.8s linear infinite;
    }
    .setup-input {
      width:100%; padding:11px 14px; border:1.5px solid #d1d5db; border-radius:10px;
      font-size:13px; font-family:'DM Mono',monospace; color:#1e293b;
      background:#fff; outline:none; transition:border-color .2s; box-sizing:border-box;
    }
    .setup-input:focus { border-color:#004d29; }
    .setup-input::placeholder { color:#94a3b8; font-family:'Noto Sans JP',sans-serif; }
    /* レスポンシブ高さ調整 */
    @media (min-width: 768px) {
      [data-responsive-height] { height: calc(100vh - 64px) !important; }
    }
    @media (min-width: 1024px) {
      [data-responsive-height] { height: calc(100vh - 96px) !important; }
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 lg:p-12 font-sans text-slate-900">

<!-- ===== アプリカード（schedule.html / inspection.html と同一構造） ===== -->
<div id="app"
     class="max-w-md md:max-w-2xl lg:max-w-5xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border border-gray-200 flex flex-col"
     style="height: calc(100vh - 32px);"
     data-responsive-height>

  <!-- ヘッダー（schedule.html から完全コピー） -->
  <div class="bg-sfc-dark text-white px-5 py-4 rounded-b-xl shadow-md flex justify-between items-center flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/>
        </svg>
        <div>
          <h1 class="text-base font-bold tracking-wide">支払い管理</h1>
          <p class="text-[10px] text-white/65 font-medium mt-0.5">個人専用 支払い台帳</p>
        </div>
      </div>
    </div>
    <!-- 右: 設定ボタン（URL設定後に表示。非表示時も同サイズで余白確保） -->
    <button id="settingsBtn" onclick="openChangePanel()"
            class="flex items-center justify-center w-8 h-8 rounded-lg bg-white/15 hover:bg-white/25 transition-colors opacity-0 pointer-events-none"
            title="URL設定を変更">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- コンテンツエリア -->
  <div class="flex-1 flex flex-col relative min-h-0">

    <!-- ローディング -->
    <div id="loadingOverlay"
         class="absolute inset-0 bg-slate-50 z-50 hidden items-center justify-center flex-col gap-3">
      <div class="spinner"></div>
      <p class="text-xs text-slate-400">読み込み中...</p>
    </div>

    <!-- セットアップ画面（URL未設定時） -->
    <div id="setupScreen" class="flex-1 flex items-center justify-center p-6">
      <div class="w-full max-w-xs">
        <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
               fill="none" stroke="#004d29" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
            <line x1="6" y1="15" x2="10" y2="15"/>
          </svg>
        </div>
        <h2 class="text-base font-bold text-slate-800 mb-1">GAS WebApp URL を設定</h2>
        <p class="text-xs text-slate-500 leading-relaxed mb-5">
          支払い管理ツールを使用するには、デプロイ済みの GAS WebApp URL を入力してください。一度設定すると次回から自動的に開きます。
        </p>
        <p class="text-[11px] font-semibold text-slate-600 mb-2">WebApp URL</p>
        <input type="url" id="urlInput" class="setup-input"
               placeholder="https://script.google.com/macros/s/..."
               oninput="onUrlInput()">
        <p class="text-[11px] text-slate-400 mt-2 leading-relaxed">
          GAS エディタ →「デプロイ」→「デプロイを管理」からコピーした URL を貼り付けてください。
        </p>
        <p id="setupError" class="text-[11px] text-red-500 mt-2 hidden">
          有効な GAS WebApp URL を入力してください。
        </p>
        <button id="saveBtn" onclick="saveUrl()" disabled
                class="w-full mt-5 py-3 bg-sfc-dark text-white rounded-xl text-sm font-bold
                       hover:opacity-90 active:opacity-75 disabled:opacity-40 disabled:cursor-not-allowed transition-opacity">
          このURLで開く
        </button>
      </div>
    </div>

    <!-- GAS WebApp iframe（URL設定後） -->
    <iframe id="gasFrame" allow="clipboard-write" allowfullscreen
            class="flex-1 w-full border-none hidden"></iframe>

  </div>
</div>

<!-- URL変更パネル -->
<div id="changePanel"
     class="fixed inset-0 z-50 bg-black/40 hidden items-end justify-center">
  <div class="bg-white rounded-t-2xl p-5 pb-8 w-full max-w-md shadow-xl">
    <p class="text-sm font-bold text-slate-800 mb-4">WebApp URL を変更</p>
    <div class="flex gap-2">
      <input type="url" id="changeUrlInput" class="setup-input flex-1"
             placeholder="https://script.google.com/macros/s/...">
      <button onclick="updateUrl()"
              class="flex-shrink-0 px-4 py-[11px] bg-sfc-dark text-white rounded-xl text-sm font-bold whitespace-nowrap">
        保存
      </button>
    </div>
    <button onclick="closeChangePanel()"
            class="w-full mt-3 py-3 bg-slate-100 text-slate-500 border border-slate-200 rounded-xl text-sm font-semibold">
      キャンセル
    </button>
  </div>
</div>

<script>
const STORAGE_KEY = 'payment_gas_url_v1';

function goToDashboard() {
  const href = window.location.href;
  const base = href.substring(0, href.lastIndexOf('/') + 1);
  window.location.replace('../index.html?tab=tools');
}
// ネイティブ戻るボタン（スワイプ含む）もダッシュボードへ
history.pushState(null, '', window.location.href);
window.addEventListener('popstate', function() { goToDashboard(); });

function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) loadGasApp(saved);
}

function loadGasApp(url) {
  document.getElementById('setupScreen').classList.add('hidden');

  var content = document.querySelector('.flex-1.flex.flex-col.relative');
  if (content) {
    content.innerHTML =
      '<div id="loadingOverlay" class="absolute inset-0 bg-slate-50 z-50 flex items-center justify-center flex-col gap-3">' +
        '<div class="spinner"></div>' +
        '<p class="text-xs text-slate-400">読み込み中...</p>' +
      '</div>' +
      '<iframe id="gasFrame" src="' + url + '" allow="clipboard-write" allowfullscreen ' +
      'class="flex-1 w-full border-none" style="height:100%;" ' +
      'onload="document.getElementById(\'loadingOverlay\').style.display=\'none\'"></iframe>';
  }
}

function onUrlInput() {
  const val   = document.getElementById('urlInput').value.trim();
  const valid = val.startsWith('https://script.google.com/macros/s/');
  document.getElementById('saveBtn').disabled = !valid;
  document.getElementById('setupError').classList.toggle('hidden', !(val && !valid));
}

function saveUrl() {
  const val = document.getElementById('urlInput').value.trim();
  if (!val.startsWith('https://script.google.com/macros/s/')) return;
  localStorage.setItem(STORAGE_KEY, val);
  loadGasApp(val);
}

function openChangePanel() {
  document.getElementById('changeUrlInput').value = localStorage.getItem(STORAGE_KEY) || '';
  const p = document.getElementById('changePanel');
  p.classList.remove('hidden');
  p.classList.add('flex');
}
function closeChangePanel() {
  const p = document.getElementById('changePanel');
  p.classList.add('hidden');
  p.classList.remove('flex');
}
function updateUrl() {
  const val = document.getElementById('changeUrlInput').value.trim();
  if (!val.startsWith('https://script.google.com/macros/s/')) {
    alert('有効な GAS WebApp URL を入力してください。');
    return;
  }
  localStorage.setItem(STORAGE_KEY, val);
  closeChangePanel();
  loadGasApp(val);
}

document.getElementById('changePanel').addEventListener('click', function(e) {
  if (e.target === this) closeChangePanel();
});

// GASフォームの高さを受け取りiframeを自動リサイズ（余白ゼロ化）
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'iframeHeight') {
    const frame = document.getElementById('gasFrame');
    if (frame && e.data.height > 0) {
      frame.style.height = e.data.height + 'px';
      frame.style.flex = 'none';
    }
  }
});

init();
</script>

    z-index:99;font-family:'Noto Sans JP',sans-serif;
  }
  .tni { display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;

</nav>
</body>
</html>
