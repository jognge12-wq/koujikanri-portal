<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width:28px; height:28px; border:3px solid #d1d5db;
      border-top-color:#004d29; border-radius:50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sfc: { dark:'#004d29', primary:'#006837', light:'#e8f5e9', border:'#a5d6a7' }
          },
          fontFamily: {
            sans: ['Noto Sans JP','sans-serif'],
            mono: ['DM Mono','monospace'],
          }
        }
      }
    }
  </script>
  <style>
    @media (min-width: 768px) {
      [data-responsive-height] { height: calc(100vh - 64px) !important; }
    }
    @media (min-width: 1024px) {
      [data-responsive-height] { height: calc(100vh - 96px) !important; }
    }
  </style>

<body class="bg-slate-100 min-h-screen p-4 md:p-8 lg:p-12 font-sans text-slate-900">

<div id="app"

     style="height: calc(100vh - 32px);"
     data-responsive-height>

  <!-- ヘッダー（schedule.html / payment.html と同一構造） -->
  <div class="bg-sfc-dark text-white px-5 py-4 rounded-b-xl shadow-md flex items-center gap-3 flex-shrink-0">
    <button onclick="openToolDrawer()" class="flex flex-col justify-around w-8 h-8 rounded-xl bg-white/15 active:bg-white/30 transition-colors flex-shrink-0 p-1.5">
      <span class="block w-full h-0.5 bg-white rounded-full"></span>
      <span class="block w-full h-0.5 bg-white rounded-full"></span>
      <span class="block w-full h-0.5 bg-white rounded-full"></span>
    </button>
    <div class="flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <div>
        <h1 class="text-base font-bold tracking-wide">新規物件登録</h1>

      </div>
    </div>
  </div>

  <!-- コンテンツエリア -->
  <div class="flex-1 flex flex-col relative min-h-0">
    <div id="loadingOverlay"
         class="absolute inset-0 bg-slate-50 z-50 flex items-center justify-center flex-col gap-3">
      <div class="spinner"></div>
      <p class="text-xs text-slate-400">読み込み中...</p>
    </div>
    <iframe id="gasFrame" src="" allow="clipboard-write" allowfullscreen
            class="flex-1 w-full border-none"
            onload="document.getElementById('loadingOverlay').style.display='none'">
    </iframe>
  </div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby2P2A0qi1J2As_to00a2ZE6YMg5kX-IPPJmBVGeZCh6bkSnYUP-4jvt5b2-4nrJrR6Qw/exec';
document.getElementById('gasFrame').src = GAS_URL;

function goToDashboard() { window.location.replace('../index.html'); }
function openToolDrawer(){document.getElementById('toolDrawer').classList.add('open');document.getElementById('toolDrawerOverlay').classList.add('open');}
function closeToolDrawer(){document.getElementById('toolDrawer').classList.remove('open');document.getElementById('toolDrawerOverlay').classList.remove('open');}
</script>

<!-- ===== 簡易サイドドロワー ===== -->
<style>
  .tdrawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
  .tdrawer-overlay.open{opacity:1;pointer-events:auto;}
  .tdrawer{position:fixed;left:-270px;top:0;bottom:0;width:260px;background:#fff;z-index:201;transition:left .22s cubic-bezier(0.22,1,0.36,1);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(24px + env(safe-area-inset-bottom,0px));}
  .tdrawer.open{left:0;}
  .tdrawer-head{background:linear-gradient(135deg,#004d29 0%,#00703d 100%);color:white;padding:20px 18px 16px;font-family:'Noto Sans JP',sans-serif;}
  .tdrawer-head-title{font-size:15px;font-weight:700;}.tdrawer-head-sub{font-size:11px;opacity:.65;margin-top:2px;}
  .tdrawer-sec{font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:.06em;text-transform:uppercase;padding:14px 18px 4px;}
  .tdrawer-item{display:flex;align-items:center;gap:12px;padding:12px 18px;font-size:14px;font-weight:500;color:#374151;cursor:pointer;text-decoration:none;font-family:'Noto Sans JP',sans-serif;transition:background .12s;}
  .tdrawer-item:active{background:#f3f4f6;}.tdrawer-item.active{color:#006837;font-weight:600;}
  .tdrawer-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
  .tdrawer-sep{height:1px;background:#e8eaed;margin:6px 0;}.tdrawer-ext{width:13px!important;height:13px!important;margin-left:auto;opacity:.45;}
</style>
