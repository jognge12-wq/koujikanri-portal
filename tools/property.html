<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="../manifest.json">
  <title>新規物件登録</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width:28px; height:28px; border:3px solid #d1d5db;
      border-top-color:#004d29; border-radius:50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sfc: { dark:'#004d29', primary:'#006837', light:'#e8f5e9', border:'#a5d6a7' }
          },
          fontFamily: {
            sans: ['Noto Sans JP','sans-serif'],
            mono: ['DM Mono','monospace'],
          }
        }
      }
    }
  </script>
  <style>
    @media (min-width: 768px) {
      [data-responsive-height] { height: calc(100vh - 64px) !important; }
    }
    @media (min-width: 1024px) {
      [data-responsive-height] { height: calc(100vh - 96px) !important; }
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8 lg:p-12 font-sans text-slate-900">

<div id="app"
     class="max-w-md md:max-w-2xl lg:max-w-5xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden border border-gray-200 flex flex-col"
     style="height: calc(100vh - 32px);"
     data-responsive-height>

  <!-- ヘッダー（schedule.html / payment.html と同一構造） -->
  <div class="bg-sfc-dark text-white px-5 py-4 rounded-b-xl shadow-md flex items-center flex-shrink-0">
    <div class="flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <div>
        <h1 class="text-base font-bold tracking-wide">新規物件登録</h1>
        <p class="text-[10px] text-white/65 font-medium mt-0.5">Notion 担当物件一覧へ登録</p>
      </div>
    </div>
  </div>

  <!-- コンテンツエリア -->
  <div class="flex-1 flex flex-col relative min-h-0">
    <div id="loadingOverlay"
         class="absolute inset-0 bg-slate-50 z-50 flex items-center justify-center flex-col gap-3">
      <div class="spinner"></div>
      <p class="text-xs text-slate-400">読み込み中...</p>
    </div>
    <iframe id="gasFrame" src="" allow="clipboard-write" allowfullscreen
            class="flex-1 w-full border-none"
            onload="document.getElementById('loadingOverlay').style.display='none'">
    </iframe>
  </div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby2P2A0qi1J2As_to00a2ZE6YMg5kX-IPPJmBVGeZCh6bkSnYUP-4jvt5b2-4nrJrR6Qw/exec';
document.getElementById('gasFrame').src = GAS_URL;

function goToDashboard() { window.location.replace('../index.html'); }
</script>

<!-- ===== ボトムナビ ===== -->
<style>
  .tool-bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(56px + env(safe-area-inset-bottom,0px));background:#fff;border-top:1px solid #e8eaed;display:flex;justify-content:space-around;align-items:flex-start;padding-top:5px;padding-bottom:env(safe-area-inset-bottom,0px);padding-left:max(env(safe-area-inset-left,0px),4px);padding-right:max(env(safe-area-inset-right,0px),4px);z-index:99;font-family:'Noto Sans JP',sans-serif;}
  .tni{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;cursor:pointer;color:#9ca3af;transition:color .12s;text-decoration:none;}
  .tni.active{color:#006837;}.tni svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}.tni-lbl{font-size:9px;font-weight:500;}
</style>
<nav class="tool-bottom-nav">
  <a class="tni" href="../index.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="tni-lbl">ホーム</span></a>
  <a class="tni" href="../index.html?tab=tasks"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span class="tni-lbl">タスク</span></a>
  <a class="tni" href="../index.html?tab=week"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="2" x2="9" y2="6"/><line x1="15" y1="2" x2="15" y2="6"/></svg><span class="tni-lbl">予定</span></a>
  <a class="tni" href="../index.html?tab=properties"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="tni-lbl">物件</span></a>
  <a class="tni" href="./inspection.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="tni-lbl">検査依頼</span></a>
  <a class="tni" href="./payment.html"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span class="tni-lbl">支払い</span></a>
  <a class="tni active" href="./property.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span class="tni-lbl">新規物件</span></a>
  <a class="tni" href="./schedule.html"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="tni-lbl">工程作成</span></a>
</nav>
</body>
</html>
